<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор славы</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .calculator {
            background: #16213e;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 400px;
            color: #eee;
        }
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 24px;
            color: #ffd966;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            background: #0f0f1a;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus {
            outline: 2px solid #ffd966;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ffd966;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background: #ffcd38;
            transform: scale(0.98);
        }
        .result {
            background: #0f0f1a;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-top: 24px;
        }
        .result span {
            font-size: 42px;
            font-weight: bold;
            color: #ffd966;
            display: block;
            margin-top: 8px;
        }
        .small-note {
            font-size: 13px;
            text-align: center;
            margin-top: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="calculator">
    <h1>⚔️ Калькулятор славы</h1>

    <div class="input-group">
        <label>🎯 Урон</label>
        <input type="number" id="damage" placeholder="Например, 8349" value="">
    </div>

    <div class="input-group">
        <label>📈 Уровень персонажа</label>
        <input type="number" id="level" placeholder="Например, 6" value="6">
    </div>

    <div class="input-group">
        <label>✨ Бонус к славе (%)</label>
        <input type="number" id="bonus" placeholder="Например, 20" value="0">
    </div>

    <button onclick="calculateFame()">Рассчитать славу 🏆</button>

    <div class="result">
        📊 ИТОГОВАЯ СЛАВА
        <span id="fameResult">—</span>
    </div>
    <div class="small-note">
            Matrix…
    </div>
</div>

<script>
    // Функция расчёта славы (рабочая)
    function getFame(damage, level, bonusPercent = 0) {
        const divisor = 6 * level + 6;
        const baseFame = Math.round(damage / divisor);
        const fameWithBonus = Math.round(baseFame * (1 + bonusPercent / 100));
        return fameWithBonus;
    }

    // Функция для отображения результата в интерфейсе
    function calculateFame() {
        const damage = parseFloat(document.getElementById('damage').value);
        const level = parseInt(document.getElementById('level').value);
        const bonus = parseFloat(document.getElementById('bonus').value);

        // Проверяем, что введены корректные числа
        if (isNaN(damage) || isNaN(level) || isNaN(bonus)) {
            document.getElementById('fameResult').innerText = 'Ошибка';
            return;
        }
        if (level < 1) {
            document.getElementById('fameResult').innerText = 'Уровень ≥ 1';
            return;
        }
        if (damage < 0) {
            document.getElementById('fameResult').innerText = 'Урон ≥ 0';
            return;
        }

        const fame = getFame(damage, level, bonus);
        document.getElementById('fameResult').innerText = fame;
    }
</script>
</body>
</html>
